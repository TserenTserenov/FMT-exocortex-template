name: Canon Sync (RU → EN iwesys / RU mirror MimEcoSys)

# see WP-415 Ф-В2 (translation pipeline automation) + Ф-В7/spec (МИМ mirror)
# and WP-401 (aisystant/iwesys/MimEcoSys org split)
# Peer-sessions:
#   sessions/2026-07/2026-07-01-12-wp415-translation-pipeline-automation/report.md
#   sessions/2026-07/2026-07-07-11-wp415-pipeline-2-3-design/report.md

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: canon-sync-${{ github.ref }}
  cancel-in-progress: false

# Loop-guard: the bot only ever pushes to en-draft, which this trigger does
# not watch (branches: [main]), so branch-scoping is the actual defense
# today. Kept as a second line of defense in case the trigger ever grows to
# include en-draft pushes — do not delete as "dead code" without checking
# the trigger above first.
jobs:
  detect-changes:
    # Trigger is unconditional push-to-main (mirror-to-mim must mirror every
    # commit, not just docs changes) — this job scopes the *translation*
    # jobs back down to doc changes only, so they don't run needlessly on
    # every unrelated push (scripts/, tests/, etc.).
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      # dorny/paths-filter only uses the GitHub API on pull_request events;
      # on push it diffs local git history, so it needs the repo checked
      # out first (missing this made `docs` output empty/wrong — sync
      # would never run). Default depth is enough: push events only need
      # the pushed commit and its parent to diff.
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docs:
              - "README.md"
              - "docs/**"

  sync:
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.docs == 'true' &&
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '[skip-translate]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main (full history for delta diff)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml pytest

      - name: Run delivery tests (formal + content, unit-level)
        run: |
          pytest scripts/tests/test_delivery_formal.py \
                 scripts/tests/test_delivery_content.py \
                 scripts/tests/test_translate_delta.py -q

      - name: Fetch or create en-draft staging branch
        id: en_draft
        run: |
          if git ls-remote --exit-code --heads origin en-draft > /dev/null 2>&1; then
            git worktree add ../en-draft origin/en-draft
          else
            git worktree add -b en-draft ../en-draft
            git -C ../en-draft rm -rf --quiet . || true
          fi

      - name: Translate changed category-D files (delta)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          set +e
          # Writes straight into the en-draft worktree (already checked out
          # from origin/en-draft, holding every prior run's output) so files
          # untouched by this delta stay put. Do NOT stage this through a
          # throwaway ../en-out + `rsync --delete` mirror — that mirrors the
          # delta subset onto en-draft and deletes everything else, wiping
          # out all previously translated docs on every run that doesn't
          # touch all of them (caught 2026-07-06: a zero-file delta run
          # erased all 38 published files).
          python3 scripts/translate.py --mode=delta \
            --output-dir ../en-draft \
            --state-file ../en-draft/.translation-state.yaml
          rc=$?
          set -e
          # rc=2 is ASCII-guard warnings only: en-draft is a human-review
          # staging branch, so leftover Cyrillic stays visible in the log
          # and in delivery checks; the hard no-Cyrillic gate belongs to
          # the iwesys publish stage (Phase V4), not to this sync.
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 2 ]; then exit "$rc"; fi

      - name: Formal + content delivery checks (Tier-1 fail / Tier-2-3 warn)
        id: delivery_checks
        run: |
          set -e
          status=ok
          # Source of truth for which files to check is .translation-state.yaml
          # (written by translate.py --mode=delta), not a directory glob —
          # avoids re-deriving source paths by string-stripping ../en-draft/.
          files=$(python3 -c "
          import yaml
          with open('../en-draft/.translation-state.yaml', encoding='utf-8') as f:
              state = yaml.safe_load(f) or {}
          print('\n'.join(state.get('files_translated', [])))
          ")
          while IFS= read -r rel; do
            [ -z "$rel" ] && continue
            if ! python3 scripts/delivery_checks.py \
                --source "$rel" --output "../en-draft/$rel" \
                --glossary translation/glossary-v0.1.csv; then
              status=failed
            fi
          done <<< "$files"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" = "failed" ]; then exit 1; fi

      - name: Publish sync status badge data
        if: always() && steps.en_draft.outcome == 'success'
        run: |
          color=green
          message=ok
          if [ "${{ steps.delivery_checks.outputs.status }}" = "failed" ]; then
            color=red
            message=failed
          fi
          cat > ../en-draft/badge-data.json <<EOF
          {"schemaVersion":1,"label":"EN sync","message":"$message","color":"$color"}
          EOF

      - name: Commit and push to en-draft
        if: always() && steps.en_draft.outcome == 'success'
        run: |
          cd ../en-draft
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No translation changes to commit."
            exit 0
          fi
          git commit -m "chore(translate-sync): sync EN draft from $(git -C "$GITHUB_WORKSPACE" rev-parse --short HEAD) [skip-translate]"
          # HEAD:en-draft also covers the detached worktree that
          # `git worktree add ../en-draft origin/en-draft` produces when
          # the branch already exists on the remote
          git push origin HEAD:en-draft

  # Publishes the en-draft branch (already gated by sync's delivery_checks
  # above — this job only runs if sync succeeded) as the default branch of
  # the public EN repo in iwesys. Target repo name and creation are a
  # one-time manual bootstrap step (WP-415); until it exists this job warns
  # and no-ops rather than failing every push.
  publish-to-iwesys:
    needs: sync
    runs-on: ubuntu-latest
    env:
      TARGET_REPO: iwesys/FMT-exocortex-template-en
    steps:
      - name: Generate iwesys installation token
        id: iwesys_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.CANON_SYNC_APP_ID }}
          private-key: ${{ secrets.CANON_SYNC_APP_KEY }}
          owner: iwesys

      - name: Checkout en-draft
        uses: actions/checkout@v6
        with:
          ref: en-draft
          fetch-depth: 0

      - name: Check target repo exists
        id: target_check
        env:
          GH_TOKEN: ${{ steps.iwesys_token.outputs.token }}
        run: |
          if gh repo view "$TARGET_REPO" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::$TARGET_REPO ещё не создан (bootstrap-чеклист WP-415) — публикация в iwesys пропущена."
          fi

      - name: Push en-draft as main to iwesys
        if: steps.target_check.outputs.exists == 'true'
        run: |
          git remote add iwesys "https://x-access-token:${{ steps.iwesys_token.outputs.token }}@github.com/$TARGET_REPO.git"
          git push iwesys HEAD:refs/heads/main --force

  # Honest mirror of main into MimEcoSys — no translation, no history
  # rewrite (peer-session 2026-07-07-11: content-identity is the real
  # correlation signal, not commit SHAs; rewriting metadata breaks git
  # blame/traceability for MИМ authors without actually hiding the link).
  # Explicit refspec only — NOT `git push --mirror`, which would also push
  # en-draft, tags, and any other refs the private repo happens to hold.
  # Runs on every push to main regardless of which paths changed (unlike
  # sync/publish-to-iwesys, which are docs-scoped) — MimEcoSys must not
  # silently drift behind on non-docs commits.
  mirror-to-mim:
    needs: detect-changes
    if: >-
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '[skip-translate]')
    runs-on: ubuntu-latest
    steps:
      - name: Check MIM target configured
        id: mim_target
        run: |
          if [ -z "${{ vars.MIM_MIRROR_REPO }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::MIM_MIRROR_REPO ещё не задан (решение пилота по имени репозитория в MimEcoSys — WP-415/WP-401) — mirror пропущен."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate MimEcoSys installation token
        id: mim_token
        if: steps.mim_target.outputs.configured == 'true'
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.CANON_SYNC_APP_ID }}
          private-key: ${{ secrets.CANON_SYNC_APP_KEY }}
          owner: MimEcoSys

      - name: Checkout main (full history — honest mirror, no shallow rewrite)
        if: steps.mim_target.outputs.configured == 'true'
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Check target repo exists
        id: target_check
        if: steps.mim_target.outputs.configured == 'true'
        env:
          GH_TOKEN: ${{ steps.mim_token.outputs.token }}
        run: |
          if gh repo view "MimEcoSys/${{ vars.MIM_MIRROR_REPO }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning::MimEcoSys/${{ vars.MIM_MIRROR_REPO }} ещё не создан (bootstrap-чеклист WP-415) — mirror пропущен."
          fi

      - name: Mirror main to MimEcoSys (explicit refspec, no history rewrite)
        if: steps.mim_target.outputs.configured == 'true' && steps.target_check.outputs.exists == 'true'
        run: |
          git remote add mim "https://x-access-token:${{ steps.mim_token.outputs.token }}@github.com/MimEcoSys/${{ vars.MIM_MIRROR_REPO }}.git"
          git push mim '+refs/heads/main:refs/heads/main'
